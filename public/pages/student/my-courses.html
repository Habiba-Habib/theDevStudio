<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Courses</title>

  <link rel="stylesheet" href="../../css/my-courses.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>

<body>
  <main class="page">
    <section class="header">
      <h1>My Courses</h1>
      <p>Track your learning progress</p>
    </section>

    <section class="stats">
      <button class="stat-card" type="button" onclick="window.location.href='my-courses.html'">
        <div class="stat-icon pink-icon">
          <i class="fa-solid fa-book-open"></i>
        </div>
        <div>
          <h3>4</h3>
          <p>Total Courses</p>
        </div>
      </button>

      <button class="stat-card" type="button" onclick="window.location.href='my-courses.html'">
        <div class="stat-icon yellow-icon">
          <i class="fa-solid fa-arrow-trend-up"></i>
        </div>
        <div>
          <h3>3</h3>
          <p>In Progress</p>
        </div>
      </button>

      <button class="stat-card" type="button" onclick="window.location.href='my-courses.html'">
        <div class="stat-icon teal-icon">
          <i class="fa-solid fa-award"></i>
        </div>
        <div>
          <h3>1</h3>
          <p>Completed</p>
        </div>
      </button>

      <button class="stat-card" type="button" onclick="window.location.href='leaderboard.html'">
        <div class="stat-icon purple-icon">
          <i class="fa-solid fa-bullseye"></i>
        </div>
        <div>
          <h3>74%</h3>
          <p>Avg Progress</p>
        </div>
      </button>
    </section>

    <section class="tabs">
      <button class="tab active" type="button" data-filter="ongoing">Ongoing (3)</button>
      <button class="tab" type="button" data-filter="completed">Completed (1)</button>
    </section>

    <section class="courses" id="coursesContainer"></section>
  </main>

  <script src="../../js/my-courses.js"></script>
</body>
</html>
